name: CI
on:
  push:
  pull_request:
jobs:
  test:
    strategy:
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        julia: ['1.12', '1']
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: ${{ matrix.julia }}
      - uses: julia-actions/cache@v2
      - uses: julia-actions/julia-runtest@v1
  reactant:
    runs-on: ubuntu-latest
    env:
      JULIA_NUM_PRECOMPILE_TASKS: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Instantiate accelerator environment
        run: julia --project=test/accelerator -e 'using Pkg; Pkg.instantiate()'
      - name: Test Reactant extension
        run: julia --project=test/accelerator test/accelerator/runtests.jl
  differentiation:
    runs-on: ubuntu-latest
    env:
      JULIA_NUM_PRECOMPILE_TASKS: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Instantiate differentiation environment
        run: julia --project=test/differentiation -e 'using Pkg; Pkg.instantiate()'
      - name: Test DifferentiationInterface extension
        run: julia --project=test/differentiation test/differentiation/runtests.jl
  makie-recipes:
    runs-on: ubuntu-latest
    env:
      JULIA_NUM_PRECOMPILE_TASKS: '1'
    steps:
      - uses: actions/checkout@v4
      - uses: julia-actions/setup-julia@v2
        with:
          version: '1'
      - uses: julia-actions/cache@v2
      - name: Instantiate TiliaMakieRecipes test environment
        run: julia --project=TiliaMakieRecipes/test -e 'using Pkg; Pkg.instantiate()'
      - name: Test TiliaMakieRecipes
        run: julia --project=TiliaMakieRecipes/test TiliaMakieRecipes/test/runtests.jl
